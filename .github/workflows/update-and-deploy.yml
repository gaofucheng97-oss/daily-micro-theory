name: Update papers and deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "7 8 * * *"
    - cron: "7 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest

    outputs:
      should_run: ${{ steps.london-time.outputs.should_run }}

    steps:
      - name: Check London run time
        id: london-time
        run: |
          london_hour="$(TZ=Europe/London date +'%H')"
          london_time="$(TZ=Europe/London date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "London time: ${london_time}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] || [ "${GITHUB_EVENT_NAME}" = "push" ] || [ "${london_hour}" = "09" ]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
          fi

  update-and-deploy:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update topic papers
        continue-on-error: true
        run: npm run update-topic-papers

      - name: Refresh RePEc author watchlist
        continue-on-error: true
        run: npm run update-repec-watchlist

      - name: Update RePEc Author Watch papers
        continue-on-error: true
        run: npm run update-repec-author-papers

      - name: Save daily history copies
        run: |
          today="$(TZ=Europe/London date +'%Y-%m-%d')"
          mkdir -p data/history/topic-papers data/history/repec-author-papers

          if [ -f data/topic-papers.json ]; then
            cp data/topic-papers.json "data/history/topic-papers/${today}.json"
          fi

          if [ -f data/repec-author-papers.json ]; then
            cp data/repec-author-papers.json "data/history/repec-author-papers/${today}.json"
          fi

      - name: Validate data files
        run: npm run validate-data

      - name: Commit updated data files
        run: |
          if git diff --quiet -- data; then
            echo "Data files did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update daily paper data"
          git push

      - name: Prepare static site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html style.css script.js README.md _site/
          cp -r data _site/data

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
